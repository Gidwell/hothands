name: Verify Fast

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify-fast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.1.20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify:fast
